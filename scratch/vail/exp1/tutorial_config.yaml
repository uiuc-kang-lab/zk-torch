# Configuration for zk-torch tutorial

# Task type
task: "tutorial"

# Power-of-Tau Setup Parameters
ptau:
  ptau_path: scratch/vail/exp1/setup/ptau.ptau
  pow_len_log: 12  # Adjust based on your circuit size and PTAU file
  loaded_pow_len_log: 12 # Adjust based on your circuit size and PTAU file

# ONNX Model and Input Parameters
onnx:
  model_path: "scratch/vail/exp1/setup/model.onnx" # Path to the ONNX model generated by tutorial_prepare.py
  input_path: "scratch/vail/exp1/setup/input.json" # Path to the input JSON generated by tutorial_prepare.py

# Scale Factor / Fixed-Point Precision Parameters
sf:
  scale_factor_log: 5
  cq_range_log: 13
  cq_range_lower_log: 11

# Prover Output Paths
prover:
  setup_path: "scratch/vail/exp1/prover/setup.dat"
  model_path: "scratch/vail/exp1/prover/model.dat"
  enc_model_path: "scratch/vail/exp1/prover/enc_model.dat"
  enc_input_path: "scratch/vail/exp1/prover/enc_input.dat"
  enc_output_path: "scratch/vail/exp1/prover/enc_output.dat"
  proof_path: "scratch/vail/exp1/prover/proof.dat"
  acc_proof_path: "scratch/vail/exp1/prover/acc_proof.dat"
  final_proof_path: "scratch/vail/exp1/prover/final_proof.dat"
  enable_layer_setup: false

# Verifier Input Paths (Mirroring Prover Outputs for Verification)
verifier:
  enc_model_path: "scratch/vail/exp1/verifier/enc_model.dat"
  enc_input_path: "scratch/vail/exp1/verifier/enc_input.dat"
  enc_output_path: "scratch/vail/exp1/verifier/enc_output.dat"
  proof_path: "scratch/vail/exp1/verifier/proof.dat" 