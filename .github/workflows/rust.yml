name: Rust

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Nightly
      run: rustup override set nightly
    - name: Build
      run: cargo build
    - name: Run
      run: cargo run
    - name: Test
      run: cargo test

