name: SLURM Enqueue Workflow

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs: 
  enqueue:
    runs-on: ubuntu-latest
    steps: 
      - uses: actions/checkout@v4
      - name: Get a short version of the GIT commit SHA to use in naming files
        id: getshortsha
        run: echo "::set-output name=sha_short::$(git rev-parse --short HEAD)"
      - name: Copy files over to the cluster
        uses: garygrossgarten/github-action-scp@v0.6.0 
        with:
          local: .
          remote: "${{ secrets.GPU_ACTION_DIR }}/gh_actions/${{ steps.getshortsha.outputs.sha_short }}"
          host: ${{ secrets.HOST_NAME }}
          username: ${{ secrets.USR_NAME }}
          password: ${{ secrets.PASSWORD }}
      - name: Execute script to enqueue job in cluster
        uses: appleboy/ssh-action@v0.1.3
        with: 
          host: ${{ secrets.HOST_NAME }}
          username: ${{ secrets.USR_NAME }}
          password: ${{ secrets.PASSWORD }}
          script: | 
            cd "${{ secrets.GPU_ACTION_DIR }}/gh_actions/${{ steps.getshortsha.outputs.sha_short }}"
            python test_gpu_scripts/add_gpu_dependencies.py "${{ secrets.GPU_ACTION_DIR }}"
            mv test_gpu_scripts/test_gpu.sbatch ${{ steps.getshortsha.outputs.sha_short }}_test_gpu.sbatch
            module load anaconda/2023-Mar/3
            source activate slack
            sbatch -k ${{ steps.getshortsha.outputs.sha_short }}_test_gpu.sbatch "${{ github.event.number }}" "${{ secrets.SLACK_TOKEN }}"
