name: SLURM Enqueue Workflow

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs: 
  enqueue:
    runs-on: ubuntu-latest
    steps: 
      - uses: actions/checkout@v4
      - name: Copy files over to the cluster
        uses: garygrossgarten/github-action-scp@release 
        with:
          local: .
          remote: "${{ secrets.GPU_ACTION_DIR }}/gh_actions/${{ github.event.pull_request.head.sha }}"
          host: ${{ secrets.HOST_NAME }}
          username: ${{ secrets.USR_NAME }}
          password: ${{ secrets.PASSWORD }}
      - name: Sleep for 1 minute
        uses: jakejarvis/wait-action@master
        with:
          time: '1m'
      - name: Execute script to enqueue job in cluster
        uses: appleboy/ssh-action@v0.1.3
        with: 
          host: ${{ secrets.HOST_NAME }}
          username: ${{ secrets.USR_NAME }}
          password: ${{ secrets.PASSWORD }}
          script: | 
            cd "${{ secrets.GPU_ACTION_DIR }}/gh_actions/${{ github.event.pull_request.head.sha }}"
            python test_gpu_scripts/add_gpu_dependencies.py "${{ secrets.GPU_ACTION_DIR }}"
            mv test_gpu_scripts/test_gpu.sbatch ${{ github.event.pull_request.head.sha }}_test_gpu.sbatch
            module load anaconda/2023-Mar/3
            source activate slack
            sbatch ${{ github.event.pull_request.head.sha }}_test_gpu.sbatch "${{ github.event.number }}" "${{ secrets.SLACK_TOKEN }}" "${{ github.event.pull_request.head.sha }}"
